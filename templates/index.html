<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>art</title>
</head>
<style>
.container {
  max-width: 1200px;
  width: 90%;
  margin: 0 auto;
  
  /* --- The Box Design --- */
  background-color: #f3ebeb;       /* Box background color */
  border: 2px solid #faf6f6;       /* Clean outline border */
  border-radius: 16px;             /* Rounded corners */
  padding: 40px;                   /* Breathing room inside the box */
  
  /* Advanced effects */
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); /* Soft outer depth shadow */
  box-sizing: border-box;          /* Keeps padding inside the width */
}
.Responsive {
  width: 100%;               /* Forces the art to match the box size */
  max-width: 100%;           /* Prevents stretching past original size */
  height: auto;              /* Maintains correct aspect ratio (no distortion) */
  display: block;            /* Removes annoying bottom white-space gaps */
  border-radius: 8px;
}
</style>
<body>
    <h1><i style="align-items: center;">Ascii-Art Generator</i></h1>
    <br>
    <br>
    <br>
    <div class="container" class="Responsive">
        <form action="/art" method="post">
            <textarea name="text" placeholder="write text" style="width: 240px; height: 220px;">{{.Text}}</textarea>
            <br>
            <select name="banner">
                <option value="standard">standard</option>
                <option value="shadow">shadow</option>
                <option value="thinkertoy">thinkertoy</option>
            </select>
            <button type="submit">generate</button>
        </form>
    </div>
   
    <div class="container" class="Responsive">
        {{if .Result}}
        <textarea style="background-color: white; color: rgb(14, 13, 13); width: 1100px; height: 400px;" name="result" placeholder="result" class="Responsive">{{.Result}}</textarea>
        {{end}}
        <button onclick="history.back()">back</button>
        <button onclick="history.forward()">Next</button>
    </div> 
    
    
</body>
</html>
