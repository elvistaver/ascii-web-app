<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝓢𝓹𝓲𝓷𝓸⠀art</title>
</head>
<style>
.container {
  max-width: 1100px;
  width: 80%;
  margin: 0 auto;
  
  background-color: hsl(171, 33%, 16%);       /* Box background color */
  border: 2px solid #faf6f6;       /* Clean outline border */
  border-radius: 16px;             /* Rounded corners */
  padding: 40px;                   /* Breathing room inside the box */
  
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); /* Soft outer depth shadow */
  box-sizing: border-box;          /* Keeps padding inside the width */
}
.Responsive {
  width: 100%;               /* Forces the art to match the box size */
  max-width: 100%;           /* Prevents stretching past original size */
  height:auto;              /* Maintains correct aspect ratio (no distortion) */
  display: block;            /* Removes annoying bottom white-space gaps */
  border-radius: 8px;
  line-height: 1.6;
}
.hero-box {
  background-image: url("/cover/download.jpg") !important;
  background-size: cover !important;
}
.space{
    margin-right: 890px;
}
.hover{
     background-color: #1d2b35;
     transition: background-color 0.3s ease;
     cursor: pointer;
     color: white;
}

</style>
<body class="hero-box">
    <h1  style="text-align: center; color: #faf6f6;"><i>Ascii-Art Generator🎨</i></h1>
    <br>
    <div class="container" class="Responsive">
        <form action="/art" method="post">
            <textarea class="Responsive" name="text" placeholder="write text" style="width: 1000px; height: 200px; background-color: rgba(27, 58, 54, 0.534);color: white;">{{.Text}}</textarea>
            <br>
            <select class="hover" name="banner">
                <option value="standard">standard</option>
                <option value="shadow">shadow</option>
                <option value="thinkertoy">thinkertoy</option>
            </select>
            <button class="hover" type="submit">generate</button>
             <select class="hover" name="extensions">
                <option value="txt">txt</option>
                <option value="csv">csv</option>
                <option value="pdf">pdf</option>
             </select>
             <button class="hover" type="submit" name="save" value="download">download</button>
        </form>
    </div>
    <br>
        {{if .Result}}
    <div class="container" class="Responsive">
        <textarea wrap="off" style="background-color: rgba(27, 58, 54, 0.534); color: white; width: 1100px; height: 300px;" name="result" placeholder="result" class="Responsive">{{.Result}}</textarea>
        
        <br>
        <button class="hover" onclick="history.back()">back</button>
        <button class="hover" onclick="history.forward()">Next</button>
        <br>
    </div>
        {{end}}
    
</body>
</html>
