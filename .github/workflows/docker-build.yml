name: Build Docker Image

# This tells GitHub to run every time you push code
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # FIXED: This must be 'runs-on', not 'runs-level'
    runs-on: ubuntu-latest

    steps:
    # 1. This copies your code from GitHub onto the cloud runner
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. This sets up Docker on GitHub's cloud computer
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. This runs the actual build test using your Dockerfile
    - name: Build the Docker image
      run: |
        docker build -t ascii-web-app:latest .
