name: Build and Test Docker Image

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 1. This builds your image
    - name: Build the Docker image
      run: |
        docker build -t ascii-web-app:latest .

    # 2. This runs your app in the background on port 8080
    - name: Start the Container to Test
      run: |
        docker run -d -p 8080:8080 --name test-app ascii-web-app:latest
        
        # Give the Go app 3 seconds to start up completely
        sleep 3

    # 3. This tests if your app is actually serving web traffic!
    - name: Test Localhost Web Response
      run: |
        curl -f http://localhost:8080 || exit 1

    # 4. Cleanup after test passes
    - name: Stop Container
      if: always()
      run: |
        docker stop test-app && docker rm test-app
